services:
  mysql:
    image: mysql:8.4
    container_name: sexta_dev_mysql
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - sexta_dev_net

  backend:
    container_name: sexta_dev_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sexta_dev_net

  frontend:
    container_name: sexta_dev_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sexta_dev_net

volumes:
  mysql_data:
  db_backups:

networks:
  sexta_dev_net:
    driver: bridge