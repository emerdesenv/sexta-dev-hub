services:
  traefik:
    image: traefik:v2.11
    container_name: sexta_dev_traefik
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.le.acme.email=${SSL_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
    restart: unless-stopped
    labels:
      - traefik.enable=true

      # Dashboard protegido
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=le
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth,secure-headers

      # Usuário: admin / senha de exemplo; troque esse hash
      - traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$apr1$$H6uskkkW$$IgXLP6ewTrSuBkTrqE8wj/

      # Headers de segurança globais
      - traefik.http.middlewares.secure-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.secure-headers.headers.frameDeny=true
      - traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.secure-headers.headers.customResponseHeaders.X-Forwarded-Proto=https
    networks:
      - sexta_dev_net

  mysql:
    image: mysql:8.4
    container_name: sexta_dev_mysql
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - sexta_dev_net

  backend:
    build: ./backend
    container_name: sexta_dev_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/uploads`) || Path(`/health`))
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=le
      - traefik.http.routers.backend.middlewares=secure-headers
      - traefik.http.services.backend.loadbalancer.server.port=3000
    networks:
      - sexta_dev_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: sexta_dev_frontend
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - traefik.enable=true

      # Domínio principal
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.routers.frontend.middlewares=secure-headers
      - traefik.http.services.frontend.loadbalancer.server.port=80

      # WWW -> domínio principal
      - traefik.http.routers.frontend-www.rule=Host(`www.${DOMAIN}`)
      - traefik.http.routers.frontend-www.entrypoints=websecure
      - traefik.http.routers.frontend-www.tls=true
      - traefik.http.routers.frontend-www.tls.certresolver=le
      - traefik.http.routers.frontend-www.middlewares=redirect-to-root

      - traefik.http.middlewares.redirect-to-root.redirectregex.regex=^https://www\\.${DOMAIN}/(.*)
      - traefik.http.middlewares.redirect-to-root.redirectregex.replacement=https://${DOMAIN}/$${1}
      - traefik.http.middlewares.redirect-to-root.redirectregex.permanent=true
    networks:
      - sexta_dev_net

  db_backup:
    image: mysql:8.4
    container_name: sexta_dev_db_backup
    env_file:
      - ./.env
    volumes:
      - ./backup:/backup
      - db_backups:/db_backups
    entrypoint: ["/bin/sh", "/backup/backup.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sexta_dev_net

volumes:
  mysql_data:
  db_backups:

networks:
  sexta_dev_net:
    driver: bridge