services:
  mysql:
    image: mysql:8.4
    container_name: sexta_dev_mysql
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - sexta_dev_net

  backend:
    build: ./backend
    container_name: sexta_dev_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sexta_dev_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: sexta_dev_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sexta_dev_net

  nginx:
    image: nginx:1.27-alpine
    container_name: sexta_dev_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - sexta_dev_net

  db_backup:
    image: mysql:8.4
    container_name: sexta_dev_db_backup
    env_file:
      - ./.env
    volumes:
      - ./backup:/backup
      - db_backups:/db_backups
    entrypoint: ["/bin/sh", "/backup/backup.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sexta_dev_net

volumes:
  mysql_data:
  db_backups:

networks:
  sexta_dev_net:
    driver: bridge