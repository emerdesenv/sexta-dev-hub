name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            echo "Commit anterior: $PREVIOUS_COMMIT"
            echo "Atualizando repositório..."
            git fetch origin
            git reset --hard origin/main

            # acme.json vazio/1 byte quebra o resolver LE (JSON parse). Garantir JSON mínimo + 600.
            mkdir -p traefik/letsencrypt
            BYTES=$(wc -c < traefik/letsencrypt/acme.json 2>/dev/null || echo 0)
            if [ "$BYTES" -lt 4 ]; then echo '{}' > traefik/letsencrypt/acme.json; fi
            chmod 600 traefik/letsencrypt/acme.json

            echo "Subindo containers de produção..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            echo "Aguardando aplicação subir..."
            sleep 10

            echo "Validando healthcheck..."
            if ! curl -f https://${{ secrets.APP_DOMAIN }}/health; then
              echo "Healthcheck falhou. Executando rollback..."
              git reset --hard $PREVIOUS_COMMIT
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
              exit 1
            fi

            echo "Removendo imagens órfãs não utilizadas..."
            docker image prune -f

            echo "Deploy finalizado com sucesso."
