name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            echo "Commit anterior: $PREVIOUS_COMMIT"
            echo "Atualizando repositório..."
            git fetch origin
            git reset --hard origin/main

            echo "Garantindo permissões seguras do ACME..."
            mkdir -p traefik/letsencrypt
            touch traefik/letsencrypt/acme.json
            chmod 600 traefik/letsencrypt/acme.json

            echo "Subindo containers de produção..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "Aguardando containers ficarem healthy..."
            wait_for_healthy() {
              local container_name="$1"
              local max_attempts=30
              local attempt=1
              while [ $attempt -le $max_attempts ]; do
                status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || echo "missing")
                if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                  echo "$container_name está $status"
                  return 0
                fi
                echo "Aguardando $container_name (status: $status) tentativa $attempt/$max_attempts..."
                sleep 5
                attempt=$((attempt + 1))
              done
              echo "$container_name não ficou saudável a tempo."
              return 1
            }

            if ! wait_for_healthy sexta_dev_backend || ! wait_for_healthy sexta_dev_frontend; then
              echo "Containers não ficaram saudáveis. Executando rollback..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=120 frontend backend
              git reset --hard $PREVIOUS_COMMIT
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
              exit 1
            fi

            echo "Validando frontend e API..."
            if ! curl -fsS https://${{ secrets.APP_DOMAIN }}/ \
              || ! curl -fsS https://${{ secrets.APP_DOMAIN }}/health \
              || ! curl -fsS https://${{ secrets.APP_DOMAIN }}/api/health; then
              echo "Healthcheck falhou. Executando rollback..."
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=120 frontend backend
              git reset --hard $PREVIOUS_COMMIT
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
              exit 1
            fi

            echo "Removendo imagens órfãs não utilizadas..."
            docker image prune -f

            echo "Deploy finalizado com sucesso."