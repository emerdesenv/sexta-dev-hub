name: API Docs Guard

on:
  pull_request:
    branches: [ main ]

jobs:
  openapi-sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check API/OpenAPI sync
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          API_CHANGED="false"
          OPENAPI_CHANGED="false"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" == backend/src/routes/* || "$file" == backend/src/controllers/* || "$file" == backend/src/app.js ]]; then
              API_CHANGED="true"
            fi
            if [[ "$file" == backend/src/docs/openapi.js ]]; then
              OPENAPI_CHANGED="true"
            fi
          done <<< "$CHANGED_FILES"

          echo "API_CHANGED=$API_CHANGED"
          echo "OPENAPI_CHANGED=$OPENAPI_CHANGED"

          if [[ "$API_CHANGED" == "true" && "$OPENAPI_CHANGED" != "true" ]]; then
            echo "Erro: houve mudanca de API sem atualizar backend/src/docs/openapi.js."
            echo "Atualize a documentacao OpenAPI no mesmo PR."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        run: npm test
        working-directory: backend
