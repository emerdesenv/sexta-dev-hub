services:
  traefik:
    image: traefik:v2.11
    container_name: sexta_dev_traefik
    command:
      - --api.dashboard=false
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.le.acme.email=${SSL_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - sexta_dev_net

  mysql:
    ports:
      - "127.0.0.1:3306:3306"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/uploads`) || Path(`/health`))
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=le
      - traefik.http.routers.backend.priority=100
      - traefik.http.services.backend.loadbalancer.server.port=3000
    networks:
      - sexta_dev_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GITHUB_URL: ${VITE_GITHUB_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-root.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend-root.entrypoints=websecure
      - traefik.http.routers.frontend-root.tls=true
      - traefik.http.routers.frontend-root.tls.certresolver=le
      - traefik.http.routers.frontend-root.priority=1
      - traefik.http.routers.frontend-root.service=frontend
      - traefik.http.services.frontend.loadbalancer.server.port=80
      - traefik.http.routers.frontend-www.rule=Host(`www.${DOMAIN}`)
      - traefik.http.routers.frontend-www.entrypoints=websecure
      - traefik.http.routers.frontend-www.tls=true
      - traefik.http.routers.frontend-www.tls.certresolver=le
      - traefik.http.routers.frontend-www.middlewares=redirect-to-root
      - traefik.http.routers.frontend-www.service=noop@internal
      - traefik.http.middlewares.redirect-to-root.redirectregex.regex=^https://www\\.(.+)
      - traefik.http.middlewares.redirect-to-root.redirectregex.replacement=https://$${1}
      - traefik.http.middlewares.redirect-to-root.redirectregex.permanent=true
    networks:
      - sexta_dev_net

  db_backup:
    image: mysql:8.4
    container_name: sexta_dev_db_backup
    env_file:
      - ./.env
    volumes:
      - ./backup:/backup
      - db_backups:/db_backups
    entrypoint: ["/bin/sh", "/backup/backup.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sexta_dev_net