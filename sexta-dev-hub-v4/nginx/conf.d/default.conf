upstream sexta_dev_frontend {
  server frontend:80;
}

upstream sexta_dev_backend {
  server backend:3000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 50m;

  location /api/ {
    proxy_pass http://sexta_dev_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://sexta_dev_backend/health;
    proxy_set_header Host $host;
  }

  location /uploads/ {
    proxy_pass http://sexta_dev_backend/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://sexta_dev_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
