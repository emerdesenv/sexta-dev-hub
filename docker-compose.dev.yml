services:
  mysql:
    ports:
      - "3306:3306"

  backend:
    image: node:20-alpine
    container_name: sexta_dev_backend_dev
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    command: sh -c "npm install && npm run dev"
    depends_on:
      mysql:
        condition: service_healthy
    # Evita o frontend (Vite) proxar /api antes da API estar escutando em :3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health',(r)=>{r.resume();process.exit(r.statusCode===200?0:1);}).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    networks:
      - sexta_dev_net

  frontend:
    image: node:20-alpine
    container_name: sexta_dev_frontend_dev
    working_dir: /app
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sexta_dev_net